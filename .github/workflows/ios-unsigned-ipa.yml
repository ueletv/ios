# 免费云端 Mac 打未签名 IPA（无需 Apple Developer）
name: iOS unsigned IPA

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-ipa:
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Flutter pub get
        run: flutter pub get

      - name: Precache iOS
        run: flutter precache --ios

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install --repo-update

      - name: Build iOS release (no codesign)
        run: |
          set -o pipefail
          flutter build ios --release --no-codesign -v 2>&1 | tee build_ios.log

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build_ios.log
          retention-days: 3

      - name: Package unsigned IPA
        if: success()
        run: |
          cd build/ios/iphoneos
          rm -rf Payload unsigned.ipa
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -y -r unsigned.ipa Payload
          ls -lh unsigned.ipa

      - name: Upload IPA artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: videoweb-unsigned-ipa
          path: build/ios/iphoneos/unsigned.ipa
          retention-days: 7
